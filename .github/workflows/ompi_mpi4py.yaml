name: MPI4PY check

on: [pull_request]

env:
  ROCM_VER: 5-4
jobs:
  run_mpi4py:
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y --no-install-recommends wget lsb-core software-properties-common curl python3-pip
        pip3 install cython
    - uses: actions/checkout@v3
      with:
            submodules: recursive
    - name: Build Open MPI
      run: |
        ./autogen.pl
        ./configure --prefix=$PWD/install --disable-oshmem --disable-mpi-fortran
        make -j install
    - name: Build MPI4py
      run: |
        wget https://github.com/mpi4py/mpi4py/releases/download/3.1.5/mpi4py-3.1.5.tar.gz
        tar -zxf mpi4py-3.1.5.tar.gz
        echo $PWD
        export PATH=$PWD/install/bin:$PATH
        ls $PWD/install/bin
        export PYTHONPATH=$PYTHONPATH:$PWD/mpi4py-3.1.5/
        cd mpi4py-3.1.5
        python3 setup.py build --mpicc="mpicc -shared"
        python3 setup.py install --user
    - name: Run MPI4py
      run: |
        export PATH=$PWD/install/bin:$PATH
        ls $PWD/install/bin
        cd mpi4py-3.1.5/test
        mpirun --map-by :OVERSUBSCRIBE -np 3 python3 ./main.py -v -f
